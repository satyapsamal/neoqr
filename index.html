<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoQR.AI | Generate & Scan</title>
    <!-- Bricolage Grotesque Font -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <!-- QR Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2d2d35;
            --success: #22c55e;
            --font-main: 'Bricolage Grotesque', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Rainbow Fluid Animation for Heading */
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(
                to right, 
                #ff7eb3, #ff758c, #ac73ff, #00d2ff, #3a7bd5, #ff7eb3
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fluidRainbow 6s linear infinite;
        }

        @keyframes fluidRainbow {
            to { background-position: 200% center; }
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            background: var(--bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .tab.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .content-section {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .type-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding-bottom: 8px;
            -ms-overflow-style: none;
            scrollbar-width: none;
            cursor: grab;
        }

        .type-selector::-webkit-scrollbar {
            display: none;
        }

        .type-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .type-btn.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .multi-input-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input[type="text"], input[type="tel"], input[type="email"], input[type="color"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="color"] {
            height: 45px;
            padding: 4px;
            cursor: pointer;
        }

        input:focus {
            border-color: var(--primary);
        }

        /* QR Output Wrapper for Download Button */
        #qr-wrapper {
            position: relative;
            margin: 1.5rem auto;
            width: fit-content;
            display: none;
        }

        #qrcode-output {
            background: white;
            padding: 16px;
            border-radius: 16px;
        }

        #download-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }

        #download-btn:hover {
            background: rgba(0, 0, 0, 0.6);
            opacity: 1;
            transform: scale(1.05);
        }

        .customize-panel {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-top: 1rem;
            display: none;
        }

        .customize-panel.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            margin-top: 0.5rem;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-area:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: var(--primary);
        }

        .upload-area p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        #file-input {
            display: none;
        }

        .result-box {
            margin-top: 1.5rem;
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            word-break: break-all;
            display: none;
        }

        .result-box.visible {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .badge-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            background: var(--success);
            border-radius: 99px;
            color: var(--bg);
            font-weight: 700;
        }

        .time-badge {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        #copy-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        canvas#debug-canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NeoQR.AI</h1>
        <p>Making QR Creation Free and Accessible to All.</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('generate')">Generate</div>
        <div class="tab" onclick="switchTab('scan')">Scan</div>
    </div>

    <!-- Generate Section -->
    <div id="generate-section" class="content-section active">
        <div class="type-selector" id="mode-scroller">
            <button class="type-btn active" onclick="setMode('url', this)">Website</button>
            <button class="type-btn" onclick="setMode('file', this)">PDF/Image</button>
            <button class="type-btn" onclick="setMode('text', this)">Text</button>
            <button class="type-btn" onclick="setMode('wifi', this)">Wi-Fi</button>
            <button class="type-btn" onclick="setMode('vcard', this)">Contact</button>
            <button class="type-btn" onclick="setMode('sms', this)">SMS</button>
            <button class="type-btn" onclick="setMode('email', this)">Email</button>
        </div>

        <div id="input-container" class="multi-input-container">
            <!-- Inputs dynamically injected here -->
        </div>

        <div id="qr-wrapper">
            <div id="qrcode-output"></div>
            <button id="download-btn" onclick="downloadPNG()" title="Download PNG Image">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
        </div>

        <button class="btn btn-secondary" onclick="toggleCustomize()">🎨 Customize QR</button>

        <div id="customize-panel" class="customize-panel">
            <div class="settings-grid">
                <div class="input-group">
                    <label>QR Color</label>
                    <input type="color" id="qr-color" value="#000000" onchange="generateQR()">
                </div>
                <div class="input-group">
                    <label>Background</label>
                    <input type="color" id="qr-bg" value="#ffffff" onchange="generateQR()">
                </div>
            </div>
            <div class="input-group">
                <label>Correction Level</label>
                <select id="qr-correction" onchange="generateQR()" style="width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 8px; font-family: inherit;">
                    <option value="L">Low (7%)</option>
                    <option value="M">Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H" selected>High (30%)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Scan Section -->
    <div id="scan-section" class="content-section">
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; color: var(--primary);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p id="upload-instruction">Click or drag image to upload</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div id="scan-result" class="result-box">
            <div class="result-header">
                <div class="badge-group">
                    <span class="badge" id="status-badge">SUCCESS</span>
                    <span class="time-badge" id="scan-time"></span>
                </div>
                <button id="copy-btn" onclick="copyResult()">Copy</button>
            </div>
            <div id="result-text" style="font-size: 0.9rem; color: var(--text);"></div>
        </div>
    </div>
</div>

<canvas id="debug-canvas"></canvas>

<script>
    let currentMode = 'url';

    const scroller = document.getElementById('mode-scroller');
    scroller.addEventListener('wheel', (evt) => {
        evt.preventDefault();
        scroller.scrollLeft += evt.deltaY;
    });

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
        
        if (tab === 'generate') {
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('generate-section').classList.add('active');
        } else {
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('scan-section').classList.add('active');
        }
    }

    function toggleCustomize() {
        document.getElementById('customize-panel').classList.toggle('active');
    }

    function setMode(type, btn) {
        currentMode = type;
        document.querySelectorAll('.type-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        
        const container = document.getElementById('input-container');
        container.innerHTML = "";
        
        if (type === 'url') {
            addInput('URL', 'url-input', 'https://example.com');
        } else if (type === 'file') {
            addInput('File Public URL', 'file-input-url', 'https://yourcloud.com/file.pdf');
        } else if (type === 'text') {
            addInput('Message', 'text-input', 'Type your text here...');
        } else if (type === 'wifi') {
            addInput('Network Name (SSID)', 'wifi-ssid', 'MyNetwork');
            addInput('Password', 'wifi-pass', '********');
        } else if (type === 'vcard') {
            addInput('Full Name', 'vc-name', 'John Doe');
            addInput('Phone', 'vc-phone', '+123456789', 'tel');
            addInput('Email', 'vc-email', 'john@example.com', 'email');
        } else if (type === 'sms') {
            addInput('Phone Number', 'sms-phone', '+123456789', 'tel');
            addInput('Message', 'sms-msg', 'Hello!');
        } else if (type === 'email') {
            addInput('Recipient Email', 'mail-to', 'hello@example.com', 'email');
            addInput('Subject', 'mail-sub', 'Regarding...');
        }
        
        document.getElementById('qr-wrapper').style.display = "none";
    }

    function addInput(label, id, placeholder, type = 'text') {
        const group = document.createElement('div');
        group.className = 'input-group';
        group.innerHTML = `
            <label>${label}</label>
            <input type="${type}" id="${id}" placeholder="${placeholder}" autocomplete="off" oninput="debounceGenerate()">
        `;
        document.getElementById('input-container').appendChild(group);
    }

    let debounceTimer;
    function debounceGenerate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(generateQR, 500);
    }

    setMode('url', document.querySelector('.type-btn'));

    let qrcodeInstance = null;
    function generateQR() {
        let finalString = "";
        
        try {
            if (currentMode === 'url') finalString = document.getElementById('url-input').value;
            else if (currentMode === 'file') finalString = document.getElementById('file-input-url').value;
            else if (currentMode === 'text') finalString = document.getElementById('text-input').value;
            else if (currentMode === 'wifi') {
                const ssid = document.getElementById('wifi-ssid').value;
                const pass = document.getElementById('wifi-pass').value;
                finalString = `WIFI:T:WPA;S:${ssid};P:${pass};;`;
            } else if (currentMode === 'vcard') {
                const name = document.getElementById('vc-name').value;
                const phone = document.getElementById('vc-phone').value;
                const email = document.getElementById('vc-email').value;
                finalString = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
            } else if (currentMode === 'sms') {
                const phone = document.getElementById('sms-phone').value;
                const msg = document.getElementById('sms-msg').value;
                finalString = `SMSTO:${phone}:${msg}`;
            } else if (currentMode === 'email') {
                const to = document.getElementById('mail-to').value;
                const sub = document.getElementById('mail-sub').value;
                finalString = `mailto:${to}?subject=${encodeURIComponent(sub)}`;
            }
        } catch (e) { return; }

        const wrapper = document.getElementById('qr-wrapper');
        const output = document.getElementById('qrcode-output');
        
        if (!finalString.trim()) {
            wrapper.style.display = "none";
            return;
        }

        const darkColor = document.getElementById('qr-color').value;
        const lightColor = document.getElementById('qr-bg').value;
        const correctionLevel = document.getElementById('qr-correction').value;

        output.innerHTML = "";
        wrapper.style.display = "block";

        const corrMap = {
            'L': QRCode.CorrectLevel.L,
            'M': QRCode.CorrectLevel.M,
            'Q': QRCode.CorrectLevel.Q,
            'H': QRCode.CorrectLevel.H
        };

        qrcodeInstance = new QRCode(output, {
            text: finalString,
            width: 256,
            height: 256,
            colorDark : darkColor,
            colorLight : lightColor,
            correctLevel : corrMap[correctionLevel] || QRCode.CorrectLevel.H
        });
    }

    // PNG Export Functionality
    function downloadPNG() {
        const canvasEl = document.querySelector('#qrcode-output canvas');
        if (!canvasEl) return;

        try {
            const dataUrl = canvasEl.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = 'generated_using_neoqr.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (err) {
            console.error("Download failed:", err);
        }
    }

    // Scanner Logic
    const fileInput = document.getElementById('file-input');
    const resultBox = document.getElementById('scan-result');
    const resultText = document.getElementById('result-text');
    const scanTimeDisplay = document.getElementById('scan-time');
    const statusBadge = document.getElementById('status-badge');
    const debugCanvas = document.getElementById('debug-canvas');
    const dctx = debugCanvas.getContext('2d', { willReadFrequently: true });

    fileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const startTime = performance.now();
                debugCanvas.width = img.width;
                debugCanvas.height = img.height;
                dctx.drawImage(img, 0, 0);
                const imageData = dctx.getImageData(0, 0, debugCanvas.width, debugCanvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                const endTime = performance.now();
                const duration = ((endTime - startTime) / 1000).toFixed(3);

                resultBox.classList.add('visible');
                
                if (code) {
                    resultText.innerText = code.data;
                    resultText.style.color = "var(--text)";
                    statusBadge.innerText = "SUCCESS";
                    statusBadge.style.background = "var(--success)";
                    scanTimeDisplay.innerText = `Scanned in ${duration}s`;
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#6366f1', '#4f46e5', '#f8fafc']
                    });
                } else {
                    resultText.innerText = "No QR code detected.";
                    resultText.style.color = "#ef4444";
                    statusBadge.innerText = "FAILED";
                    statusBadge.style.background = "#ef4444";
                    scanTimeDisplay.innerText = `Process took ${duration}s`;
                }
                fileInput.value = "";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function copyResult() {
        const text = resultText.innerText;
        if (!text || text.includes("No QR code")) return;
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 2000);
        } catch (err) {}
        document.body.removeChild(textArea);
    }
</script>

</body>
</html>
