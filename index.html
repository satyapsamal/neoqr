<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoQR | Generate & Scan</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- QR Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2d2d35;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .tabs {
            display: flex;
            background: var(--bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .tab.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .content-section {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Generator Styles */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        #qrcode-output {
            background: white;
            padding: 16px;
            border-radius: 16px;
            margin: 1.5rem auto;
            width: fit-content;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        /* Scanner Styles */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .upload-area:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: var(--primary);
        }

        .upload-area p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        #file-input {
            display: none;
        }

        .result-box {
            margin-top: 1.5rem;
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            word-break: break-all;
            display: none;
        }

        .result-box.visible {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            background: var(--success);
            border-radius: 99px;
            color: var(--bg);
            font-weight: 700;
        }

        #copy-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        canvas#debug-canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NeoQR</h1>
        <p>Generate & Scan QR</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('generate')">Generate</div>
        <div class="tab" onclick="switchTab('scan')">Scan Image</div>
    </div>

    <!-- Generate Section -->
    <div id="generate-section" class="content-section active">
        <div class="input-group">
            <label>Content (URL or Text)</label>
            <input type="text" id="qr-input" placeholder="https://example.com" autocomplete="off">
        </div>
        <div id="qrcode-output"></div>
        <button class="btn" onclick="generateQR()">Generate QR Code</button>
    </div>

    <!-- Scan Section -->
    <div id="scan-section" class="content-section">
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; color: var(--primary);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Click or drag image to upload</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div id="scan-result" class="result-box">
            <div class="result-header">
                <span class="badge">DECODED CONTENT</span>
                <button id="copy-btn" onclick="copyResult()">Copy</button>
            </div>
            <div id="result-text" style="font-size: 0.9rem; color: var(--text);"></div>
        </div>
    </div>
</div>

<canvas id="debug-canvas"></canvas>

<script>
    // Tab Logic
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
        
        if (tab === 'generate') {
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('generate-section').classList.add('active');
        } else {
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('scan-section').classList.add('active');
        }
    }

    // Generator Logic
    let qrcode = null;
    function generateQR() {
        const input = document.getElementById('qr-input').value;
        const output = document.getElementById('qrcode-output');
        
        if (!input.trim()) return;

        output.innerHTML = "";
        output.style.display = "block";

        qrcode = new QRCode(output, {
            text: input,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // Scanner Logic
    const fileInput = document.getElementById('file-input');
    const resultBox = document.getElementById('scan-result');
    const resultText = document.getElementById('result-text');
    const canvas = document.getElementById('debug-canvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // Prepare canvas
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                resultBox.classList.add('visible');
                if (code) {
                    resultText.innerText = code.data;
                    resultText.style.color = "var(--text)";
                } else {
                    resultText.innerText = "No QR code detected in this image.";
                    resultText.style.color = "#ef4444";
                }
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Copy Utility
    function copyResult() {
        const text = resultText.innerText;
        if (!text || text.includes("No QR code")) return;

        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 2000);
        } catch (err) {
            console.error('Copy failed', err);
        }
        document.body.removeChild(textArea);
    }
</script>

</body>
</html>
